<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
    transition:0.4s;
}
nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.logo{
font-size:35px;
font-weight:bold;
color:white;
letter-spacing:1px;
}

nav h2{
    margin:0;
}

nav ul{
    list-style:none;
    display:flex;      /* Makes menu items horizontal */
    gap:25px;           /* Space between items */
    margin:0;
    padding:0;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    transition:0.3s;
}

nav ul li a:hover{
    color:#00d4ff;
}

#themeBtn{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
header{
    background:#003366;
    font-size: 20px;
    padding:15px 50px;
    position:sticky;
    top:0;
    z-index:1000;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav h2{
    color:white;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

#themeBtn{
    padding:8px 12px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.hero{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1562774053-701939374585") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero-content{
    background:rgba(0,0,0,0.5);
    padding:30px;
    border-radius:10px;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    margin:15px 0;
}

.btn{
    background:#ff9800;
    color:white;
    padding:12px 25px;
    text-decoration:none;
    border-radius:5px;
}
/* CAPTION BOX */
.caption {
    position: absolute;
    bottom: 80px;
    left: 60px;
    color: white;
    z-index: 2;
    animation: slideUp 1s ease;
    max-width: 600px;
}

/* TITLE */
.caption h1 {
    font-size: 55px;
    font-weight: 800;
    margin-bottom: 15px;
    line-height: 1.2;
    text-shadow: 2px 2px 15px rgba(0,0,0,0.6);
}

/* SUBTITLE */
.caption p {
    font-size: 22px;
    margin-bottom: 25px;
    color: #e5e7eb;
    line-height: 1.5;
    text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
}

/* APPLY BUTTON */
.apply-btn {
    display: inline-block;
    padding: 15px 34px;
    background: linear-gradient(45deg, #2563eb, #38bdf8);
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    transition: all 0.4s ease;
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    animation: pulse 2s infinite;
}

/* HOVER EFFECT */
.apply-btn:hover {
    transform: translateY(-6px) scale(1.07);
    background: linear-gradient(45deg, #1d4ed8, #0ea5e9);
    box-shadow: 0 15px 30px rgba(56, 189, 248, 0.6);
}

/* PULSE ANIMATION */
@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6);
    }
    70% {
        box-shadow: 0 0 0 18px rgba(56, 189, 248, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
    }
}

/* SLIDE UP ANIMATION */
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .caption {
        left: 20px;
        right: 20px;
        bottom: 50px;
        text-align: center;
    }

    .caption h1 {
        font-size: 34px;
    }

    .caption p {
        font-size: 18px;
    }

    .apply-btn {
        padding: 12px 26px;
        font-size: 16px;
    }
}

section{
    padding:80px 10%;
}

section h2{
    margin-bottom:20px;
    color:#003366;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:30px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card i{
    font-size:40px;
    color:#003366;
    margin-bottom:15px;
}

footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:20px;
}

.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .card{
    background:#1f1f1f;
    color:white;
}

.dark-mode section h2{
    color:#4da6ff;
}

@media(max-width:768px){

nav{
    flex-direction:column;
}

nav ul{
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
}

.hero h1{
    font-size:2rem;
}
}
</style>

<script>
AOS.init({
    duration:1000,
    once:true
});

const themeBtn = document.getElementById("themeBtn");

if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark-mode");
}

themeBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme","dark");
    }else{
        localStorage.setItem("theme","light");
    }

});
</script>
